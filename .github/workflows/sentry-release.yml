name: Sentry Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SENTRY_ORG: falcon-trading-ep         # ton slug d’organisation Sentry
  SENTRY_PROJECT: tps-base-316          # ton slug de projet Sentry
  RELEASE_VERSION: tps-base-316@${{ github.sha }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ env.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ env.SENTRY_PROJECT }}
        with:
          version: ${{ env.RELEASE_VERSION }}
          environment: production

      - name: Set commits and finalize
        run: |
          npx @sentry/cli releases set-commits "$RELEASE_VERSION" --auto
          npx @sentry/cli releases finalize "$RELEASE_VERSION"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ env.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ env.SENTRY_PROJECT }}
